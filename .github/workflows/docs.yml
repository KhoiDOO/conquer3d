name: deploy-docs
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.0.2'
          use-github-cache: 'false'
          
      - name: Install dependencies and compile C++ bindings
        env:
          FORCE_CUDA: "1"
          NVCC_FLAGS: "-O3"
          TORCH_CUDA_ARCH_LIST: "8.0"
        run: pip install .[docs]
        
      - name: Debug Import
        run: |
          python -c "import conquer3d; print(conquer3d.__file__)"
          python -c "import conquer3d._C; print('Successfully imported _C!')"
          ls -la $(python -c "import conquer3d, os; print(os.path.dirname(conquer3d.__file__))")
          
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
